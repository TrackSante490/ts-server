services:
  api:
    image: python:3.11
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir 'fastapi' 'uvicorn[standard]' 'pydantic' 'boto3' 'psycopg[binary]' 'pillow' 'python-multipart' && uvicorn app:app --host 0.0.0.0 --port 8080"
    volumes:
      - ./api:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET_IMAGES: images
    ports:
      - "8080:8080"
    depends_on:
      - db
      - minio


  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - ./minio-data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"


  mc-init:
    image: minio/mc
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb -p local/images || true
      "
    
