services:
  api:
    image: python:3.11
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8080"
    volumes:
      - ./api:/app
      - ./scripts:/app/scripts:ro
      - ./cappie_run:/cappie_run
      # persist rag_state sessions outside the container so they don't vanish
      - ./rag_state:/cappie_run/rag_state
      # Optional: persist Chroma DB on the host
      - ./vectordb:/cappie_run/vectordb
      # Logos and other static assets for the API (served at /assets)
      - ./auth/assets:/app/assets:ro
    env_file:
      - .env
    environment:
      # Keep PYTHONPATH so api can import cappie_run modules
      PYTHONPATH: "/app:/cappie_run"

      # Read from .env (single source of truth)
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_IMAGES: ${S3_BUCKET_IMAGES}
      
      # RAG / Ollama config
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_started
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully

  sensor-trainer:
    build:
      context: ./scripts/ml
      dockerfile: Dockerfile.gpu
    profiles: ["ml"]
    working_dir: /workspace
    entrypoint: ["python", "/workspace/scripts/ml/train_bidmc_public_model.py"]
    volumes:
      - .:/workspace
    environment:
      PYTHONPATH: "/workspace/api"
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    shm_size: "1gb"
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  migrate:
    image: postgres:16
    restart: "no"
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./api/db/migrations:/migrations:ro
      - ./api/db/migrate.sh:/migrate.sh:ro
    entrypoint: ["bash", "/migrate.sh"]

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
      # We do NOT expose 11434 publicly here.
      # api talks to it internally via http://ollama:11434
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Keep models resident to avoid repeated cold-load latency.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      # Allow chat and embedding models to remain resident when VRAM allows.
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      # Avoid extra parallel workers increasing KV-cache pressure on the GPU.
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      set -e
      until ollama list >/dev/null 2>&1; do
        echo "waiting for ollama..."; sleep 1
      done
      ollama pull ${OLLAMA_CHAT_MODEL} || true
      ollama pull ${OLLAMA_EMBED_MODEL} || true
      exit 0

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - ./minio-data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console

  mc-init:
    image: minio/mc
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local ${S3_ENDPOINT} ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb -p local/${S3_BUCKET_IMAGES} || true
      "

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"

  authentik-postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      POSTGRES_USER: ${AUTHENTIK_POSTGRES_USER}
      POSTGRES_DB: ${AUTHENTIK_POSTGRES_DB}
    volumes:
      - ./authentik-pgdata:/var/lib/postgresql/data

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"

      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS}
      AUTHENTIK_EMAIL__USE_SSL: ${AUTHENTIK_EMAIL__USE_SSL}
      AUTHENTIK_EMAIL__TIMEOUT: ${AUTHENTIK_EMAIL__TIMEOUT}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM}
    depends_on:
      - authentik-postgresql
      - authentik-redis
    ports:
      - "9002:9000"   # Authentik web UI
      - "9443:9443"   # optional https port (can ignore for now)
    volumes:
      - ./authentik-media:/media
      - ./authentik-custom-templates:/templates
      - ./authentik-branding/custom.css:/web/dist/custom.css:ro
      - ./blank.png:/web/dist/assets/icons/icon_left_brand.png:ro

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_HOST: ${AUTHENTIK_HOST}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"

      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS}
      AUTHENTIK_EMAIL__USE_SSL: ${AUTHENTIK_EMAIL__USE_SSL}
      AUTHENTIK_EMAIL__TIMEOUT: ${AUTHENTIK_EMAIL__TIMEOUT}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM}
    depends_on:
      - authentik-postgresql
      - authentik-redis
    volumes:
      - ./authentik-media:/media
      - ./authentik-custom-templates:/templates
      - ./authentik-branding/custom.css:/web/dist/custom.css:ro
      - ./blank.png:/web/dist/assets/icons/icon_left_brand.png:ro
    
  tracksante-site:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - /srv/tracksante-site:/usr/share/nginx/html:ro
      - ./tracksante-site.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"

  tracksante-app:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - /srv/tracksante-app:/usr/share/nginx/html:ro
      - ./tracksante-app.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8089:80"

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-grafana.tracksante.com}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.tracksante.com}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/daily-health-overview.json
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_CONTENT_SECURITY_POLICY: "true"
      GRAFANA_POSTGRES_URL: ${GRAFANA_POSTGRES_URL:-db:5432}
      GRAFANA_POSTGRES_DB: ${GRAFANA_POSTGRES_DB:-postgres}
      GRAFANA_POSTGRES_USER: ${GRAFANA_POSTGRES_USER:-postgres}
      GRAFANA_POSTGRES_PASSWORD: ${GRAFANA_POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - db

volumes:
  ollama-data:
  prometheus-data:
  grafana-data:
